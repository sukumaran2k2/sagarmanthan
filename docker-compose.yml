services:
  backend:
    build: ./backend
    container_name: sagarmanthan-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/fileuploads:/app/fileuploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_RSA_PUBLIC_KEY: ${VITE_RSA_PUBLIC_KEY}
        VITE_RECAPTCHA_SITE_KEY: ${VITE_RECAPTCHA_SITE_KEY:-6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI}
    container_name: sagarmanthan-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
